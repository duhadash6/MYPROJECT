{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100" style="background: var(--background-color);">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body">
      <h2 class="card-title mb-4 text-center">Inscription</h2>
      <form action="register" method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password2" class="form-label">Password 2</label>
          <input type="password" name="password2" id="password2" class="form-control" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">S'INSCRIRE</button>
        </div>
      </form>
      <div class="text-center mt-3">
        <small>Déjà un compte ? <a href="/login">Connexion</a></small>
      </div>
    </div>
  </div>
</body>
</html>
